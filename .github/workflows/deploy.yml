name: Deploy RwandaMotor DMS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend: build & deploy (runs directly on the server) ─────────────────
  deploy-api:
    name: Deploy .NET API
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Restore & publish
        run: |
          dotnet restore backend/src/RwandaMotor.API/RwandaMotor.API.csproj
          dotnet publish backend/src/RwandaMotor.API/RwandaMotor.API.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o /tmp/rwandamotor-publish

      - name: Deploy to /opt/rwandamotor-api
        run: sudo /usr/local/bin/rwandamotor-deploy

  # ── Frontend: trigger Vercel redeploy ──────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
